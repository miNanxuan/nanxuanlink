<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>南暄（Nanxuan）</title>
<style>
  @font-face {
    font-family: 'GenSenRounded';
    src: url('https://cdn.jsdelivr.net/gh/ButTaiwan/gensen-font@v1.501/GenSenRoundedTW-R.woff2') format('woff2');
    font-weight: 400; font-display: swap;
  }
  @font-face {
    font-family: 'GenSenRounded';
    src: url('https://cdn.jsdelivr.net/gh/ButTaiwan/gensen-font@v1.501/GenSenRoundedTW-M.woff2') format('woff2');
    font-weight: 500; font-display: swap;
  }
  @font-face {
    font-family: 'GenSenRounded';
    src: url('https://cdn.jsdelivr.net/gh/ButTaiwan/gensen-font@v1.501/GenSenRoundedTW-B.woff2') format('woff2');
    font-weight: 700; font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'GenSenRounded', 'Noto Sans TC', sans-serif;
    background: #faf7f4;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .cover {
    width: 100%;
    height: 180px;
    background: linear-gradient(135deg, #b8c4c8 0%, #9eafb5 100%);
    flex-shrink: 0;
  }

  .card {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: -60px;
    padding: 0 1.4rem 4rem;
  }

  /* ── AVATAR ── */
  .avatar {
    width: 120px; height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    background: #d5cec8;
    margin-bottom: 1rem;
  }

  /* ── NAME ── */
  .name {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 0.7rem;
    text-align: center;
  }
  .name-zh {
    font-size: 1.45rem;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 0.1em;
    line-height: 1.3;
  }
  .name-en {
    font-size: 1.1rem;
    font-weight: 500;
    color: #555;
    letter-spacing: 0.06em;
    line-height: 1.5;
  }

  /* ── BIO ── */
  .bio {
    font-size: 0.95rem;
    color: #666;
    text-align: center;
    line-height: 2;
    margin-bottom: 1.6rem;
    font-weight: 400;
  }

  /* ── SOCIAL ICONS ROW ── */
  .social-row {
    display: flex;
    gap: 0.7rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }
  .social-row a {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
  }
  .social-row a:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 14px rgba(0,0,0,0.15);
  }
  .social-row a img {
    width: 22px; height: 22px;
    object-fit: contain;
  }

  /* ── SECTION ── */
  .section { width: 100%; margin-bottom: 1.2rem; }
  .section-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 0.06em;
    margin-bottom: 0.75rem;
    text-align: center;
  }

  /* ── LINK BUTTONS ──
     · 固定 min-height 讓有副標的和沒副標的高度一致
     · icon 緊貼文字左側，整體 inline 置中
  */
  .link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    width: 100%;
    min-height: 68px;          /* ← 統一高度 */
    padding: 0.9rem 1.4rem;
    margin-bottom: 0.6rem;
    background: #fff;
    border: none;
    border-radius: 14px;
    color: #1a1a1a;
    text-decoration: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    transition: background 0.18s, transform 0.15s, box-shadow 0.18s;
  }
  .link-btn:hover {
    background: #f8f5f2;
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.11);
  }
  .link-btn:active { transform: translateY(0); }

  /* icon 緊貼文字左側 */
  .btn-icon {
    width: 26px; height: 26px;
    object-fit: contain;
    flex-shrink: 0;
  }

  /* 文字區 */
  .btn-text {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    text-align: left;
  }
  .btn-title {
    font-size: 1.05rem;
    font-weight: 500;
    color: #1a1a1a;
    line-height: 1.4;
  }
  .btn-sub {
    font-size: 0.82rem;
    color: #aaa;
    font-weight: 400;
    margin-top: 0.15rem;
    line-height: 1.4;
  }

  /* ── NOTICE ── */
  .notice {
    font-size: 0.8rem;
    color: #bbb;
    text-align: center;
    line-height: 2;
    margin-top: 1.5rem;
    font-weight: 400;
  }
</style>
</head>
